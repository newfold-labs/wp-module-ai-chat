name: Publish Package to npmjs
on:
  release:
    types:
      - created
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # Node 24+ required: trusted publishing (OIDC) needs npm 11.5.1+; Node 22 ships npm 10
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
          scope: '@newfold'
          # Use NODE_AUTH_TOKEN secret when set; otherwise OIDC (Trusted Publishers) is used
          token: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Install Dependencies
        run: npm ci

      # If no NODE_AUTH_TOKEN secret: remove any token so npm uses OIDC (Trusted Publishers)
      - name: Configure npm for OIDC when no token
        run: |
          if [ -z "${{ secrets.NODE_AUTH_TOKEN }}" ]; then
            npm config delete //registry.npmjs.org/:_authToken || true
          fi

      - name: Publish
        run: npm publish

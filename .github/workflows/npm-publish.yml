name: Publish Package to npmjs
on:
  release:
    types:
      - created
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    # NPM_AUTH_TOKEN: npm automation token (same secret name as other Newfold npm publish workflows)
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # Node 24+ required for OIDC; setup-node uses NODE_AUTH_TOKEN from env for registry auth
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
          scope: '@newfold'

      - name: Install Dependencies
        run: npm ci

      - name: Publish
        run: npm publish
